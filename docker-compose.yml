services:
# Application
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: icorp-pro
    container_name: icorp-pro-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    networks:
      - icorp-network
    depends_on:
      - database
      - redis

  # Inertia SSR Server
  ssr:
    image: node:18-alpine
    container_name: icorp-pro-ssr
    restart: unless-stopped
    working_dir: /var/www
    command: node bootstrap/ssr/ssr.js
    volumes:
      - ./:/var/www
    networks:
      - icorp-network
    depends_on:
      - app

  # Queue Worker
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: icorp-pro
    container_name: icorp-pro-worker
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    networks:
      - icorp-network
    depends_on:
      - database
      - redis

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: icorp-pro-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/ssl:/etc/nginx/ssl
    networks:
      - icorp-network
    depends_on:
      - app

  # Database Service (PostgreSQL)
  database:
    image: postgres:15
    container_name: icorp-pro-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: icorp_pro
      POSTGRES_USER: icorp_user
      POSTGRES_PASSWORD: icorp_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - icorp-network

  # Redis Service
  redis:
    image: redis:alpine
    container_name: icorp-pro-redis
    restart: unless-stopped
    ports:
      - "6377:6379"
    networks:
      - icorp-network

  # Chatwoot Service
  chatwoot:
    image: chatwoot/chatwoot:latest
    container_name: icorp-chatwoot
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      
      # Database Configuration
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=icorp_user
      - POSTGRES_PASSWORD=icorp_password
      - POSTGRES_DATABASE=chatwoot_production
      
      # Redis Configuration
      - REDIS_URL=redis://redis:6379
      
      # Application Configuration
      - SECRET_KEY_BASE=ae1897e241338642683619a5e56246ce0a9f796d1285e2c663360fccd75b1b7d1e2f4d7ae4b56f31cbe0b9b5546176eeded7b4df9facf376885126cd0357d7d2
      - FRONTEND_URL=https://chatwoot.corpius.net
      - FORCE_SSL=false
      - LOGO=https://corpius.net/images/logo.png
      - BRAND_NAME=CORPIUS
      - WIDGET_BRAND_URL=
      
      # Email Configuration (use your mailhog or SMTP)
      - MAILER_SENDER_EMAIL=support@corpius.net
      - SMTP_ADDRESS=mailhog
      - SMTP_PORT=1025
      - SMTP_DOMAIN=corpius.net
      - SMTP_AUTHENTICATION=plain
      - SMTP_ENABLE_STARTTLS_AUTO=false
      
      # File Storage (local for now, can use S3)
      - ACTIVE_STORAGE_SERVICE=local
      
      # Default Admin Credentials (change after first login!)
      - CHATWOOT_ADMIN_EMAIL=admin@corpius.net
      - CHATWOOT_ADMIN_PASSWORD=AdminPassword123!
    volumes:
      - chatwoot_data:/app/storage
      - chatwoot_public:/app/public
    depends_on:
      - database
      - redis
    networks:
      - icorp-network
    command: sh -c "rm -f /app/tmp/pids/server.pid && bundle exec rails s -p 3000 -b 0.0.0.0"

  # Chatwoot Sidekiq Worker (for background jobs)
  chatwoot_sidekiq:
    image: chatwoot/chatwoot:latest
    container_name: icorp-chatwoot-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=icorp_user
      - POSTGRES_PASSWORD=icorp_password
      - POSTGRES_DATABASE=chatwoot_production
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY_BASE=ae1897e241338642683619a5e56246ce0a9f796d1285e2c663360fccd75b1b7d1e2f4d7ae4b56f31cbe0b9b5546176eeded7b4df9facf376885126cd0357d7d2
    volumes:
      - chatwoot_data:/app/storage
    depends_on:
      - database
      - redis
      - chatwoot
    networks:
      - icorp-network
    command: bundle exec sidekiq -C config/sidekiq.yml

# Volumes
volumes:
  postgres_data:
    driver: local
  chatwoot_data:
    driver: local
  chatwoot_public:
    driver: local

# Networks
networks:
  icorp-network:
    driver: bridge
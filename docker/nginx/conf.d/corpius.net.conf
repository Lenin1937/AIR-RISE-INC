server {
    listen 80;
    listen [::]:80;
    server_name www.corpius.net;

    # Redirect www HTTP → non-www HTTPS
    return 301 https://corpius.net$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name corpius.net;

    # Force HTTPS redirect
    return 301 https://corpius.net$request_uri;
}

# Redirect www HTTPS → non-www HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.corpius.net;

    ssl_certificate /etc/nginx/ssl/cloudflare-cert.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    return 301 https://corpius.net$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name corpius.net;
    
    # SSL Certificates - Cloudflare Origin Certificate
    ssl_certificate /etc/nginx/ssl/cloudflare-cert.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-key.pem;
    
    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    root /var/www/public;
    index index.php index.html;

    # Cache bypass logic (server-block scope so available in all location blocks)
    set $skip_cache 0;
    if ($cookie_laravel_session) { set $skip_cache 1; }
    if ($cookie_XSRF_TOKEN) { set $skip_cache 1; }
    if ($cookie_locale) { set $skip_cache 1; }
    if ($http_authorization) { set $skip_cache 1; }
    if ($request_uri ~* "^/(login|register|logout|dashboard|contact|password|email|api|livewire)") {
        set $skip_cache 1;
    }

    # Security headers for HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/corpius.net-access.log;
    error_log /var/log/nginx/corpius.net-error.log;

    # Let's Encrypt challenge location - serve files directly
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
        allow all;
    }

    # Redirect known garbage/noisy URLs that waste crawl budget
    # Uses $is_garbage_qs map variable defined in nginx.conf
    if ($is_garbage_qs) {
        return 301 $uri;
    }

    # X-Robots-Tag header for auth pages (belt-and-suspenders alongside meta robots noindex)
    location ~ ^/(login|register|forgot-password|reset-password|verify-email|confirm-password) {
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Chatwoot proxy
    location /chatwoot/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream chatwoot:3000;
        proxy_pass http://$upstream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
        fastcgi_hide_header X-Powered-By;
        
        # Forward headers for proper HTTPS detection
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $server_name;
        
        fastcgi_intercept_errors off;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 32k;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 180;
        fastcgi_read_timeout 180;

        # FastCGI cache — only cache GET requests for anonymous marketing pages
        fastcgi_cache LARAVEL;
        fastcgi_cache_valid 200 1h;
        fastcgi_cache_methods GET HEAD;
        fastcgi_no_cache $skip_cache;
        fastcgi_cache_bypass $skip_cache;
        fastcgi_ignore_headers Cache-Control Expires;
        fastcgi_cache_use_stale error timeout updating http_500 http_503;
        fastcgi_cache_lock on;
        add_header X-FastCGI-Cache $upstream_cache_status;
        add_header X-Skip-Cache $skip_cache;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

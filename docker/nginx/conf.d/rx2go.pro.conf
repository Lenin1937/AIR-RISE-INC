# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name rx2go.pro www.rx2go.pro;

    # Force HTTPS redirect
    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name rx2go.pro www.rx2go.pro;
    
    # SSL Certificates - self-signed (use Cloudflare Origin Cert for production)
    ssl_certificate /etc/nginx/ssl/rx2go.pro-cert.pem;
    ssl_certificate_key /etc/nginx/ssl/rx2go.pro-key.pem;
    
    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/rx2go.pro-access.log;
    error_log /var/log/nginx/rx2go.pro-error.log;

    # Client body size for file uploads
    client_max_body_size 100M;

    # Let's Encrypt challenge location
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
        allow all;
    }

    # Laravel API - proxy to rx2go backend nginx
    location /api {
        proxy_pass http://rx2go_backend_nginx;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    # Laravel Sanctum - proxy to rx2go backend nginx
    location /sanctum {
        proxy_pass http://rx2go_backend_nginx;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Backend storage files
    location /storage {
        proxy_pass http://rx2go_backend_nginx;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Vite HMR WebSocket
    location /__vite_hmr {
        proxy_pass http://rx2go_frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Vue.js Frontend (Vite dev server with HMR)
    location / {
        proxy_pass http://rx2go_frontend:5173;
        proxy_http_version 1.1;
        
        # WebSocket support for Vite HMR
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # Vite HMR settings
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Deny access to hidden files (but allow Vite internal paths)
    location ~ /\.(?!well-known|vite).* {
        deny all;
    }
}

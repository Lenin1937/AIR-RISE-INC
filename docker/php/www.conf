[www]
user = www-data
group = www-data

listen = 9000

; Process manager - dynamic is best for variable traffic
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
pm.max_requests = 500

; Logging
access.log = /proc/self/fd/2
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; Performance
pm.process_idle_timeout = 10s
